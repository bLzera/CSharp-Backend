services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-notely}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-notely}
      POSTGRES_DB: ${POSTGRES_DB:-notely}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-notely} -d ${POSTGRES_DB:-notely}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: >-
        Host=postgres;Port=5432;
        Database=${POSTGRES_DB:-notely};
        Username=${POSTGRES_USER:-notely};
        Password=${POSTGRES_PASSWORD:-notely}
      Jwt__Secret: ${JWT_SECRET:-change-me-in-production-must-be-at-least-32-chars!!}
      Jwt__Issuer: ${JWT_ISSUER:-notely-api}
      Jwt__Audience: ${JWT_AUDIENCE:-notely-client}
      Jwt__ExpiresHours: ${JWT_EXPIRES_HOURS:-24}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
